name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run Tests
      run: go test -v ./...

    - name: Build
      run: go build -v -ldflags="-H windowsgui" -o phonebridge.exe ./cmd/phonebridge

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneBridge-Windows-exe
        path: phonebridge.exe
